<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleepover VC Monitoring - System Active</title>
    <style>
        /* [CSS PREVIOUSLY DEFINED REMAINS THE SAME] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0c0c0c;
            color: #ff3131;
            font-family: 'Consolas', 'Monaco', 'Lucida Console', monospace;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #debugger {
            position: fixed; top: 0; left: 0; z-index: 99999; 
            background: rgba(0, 30, 0, 0.95); border: 2px solid #00ff00;
            color: #00ff00; padding: 12px; font-size: 0.75rem; width: 320px;
            pointer-events: auto; transition: transform 0.3s, opacity 0.3s;
        }
        #debugger.hidden { transform: translateX(-110%); opacity: 0; }

        .ticker-wrap {
            background-color: #ff0000; color: #000; width: 100%;
            overflow: hidden; white-space: nowrap; padding: 12px 0;
            font-weight: 900; font-size: 1.8rem; border-bottom: 3px solid #330000;
            flex-shrink: 0;
        }

        .ticker { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        .ticker.paused { animation-play-state: paused; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .container { display: flex; flex: 1; padding: 40px; gap: 40px; align-items: stretch; overflow: hidden; min-height: 0; }
        .timer-section { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .big-numbers { font-size: clamp(3rem, 8vw, 8rem); font-weight: 900; line-height: 0.9; margin-bottom: 20px;}
        
        .console-box {
            flex: 1.2; background-color: #08162f; display: flex; flex-direction: column;
            border: 1px solid #1a2a44; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            min-width: 0; min-height: 0;
        }

        .console-header { color: #3d8bff; padding: 15px; font-size: 1.8rem; border-bottom: 2px solid #060f21; flex-shrink: 0; }
        #console-content { flex: 1; overflow-y: auto; padding: 15px; color: #3d8bff; font-size: 1.2rem; line-height: 1.4; word-wrap: break-word; }
        .console-input-area { display: flex; background: rgba(0, 0, 0, 0.3); padding: 15px; border-top: 1px solid #1a2a44; align-items: center; flex-shrink: 0; }
        #user-input { background: transparent; border: none; color: #fff; font-family: 'Consolas', monospace; font-size: 1.2rem; flex: 1; outline: none; }
        .credits { padding: 15px 40px; font-size: 0.9rem; color: #ff3131; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="debugger">
        <div class="debug-header"><span>[SYSTEM DEBUGGER]</span></div>
        STATUS: <span id="debug-status">WAITING</span><br>
        WATCHDUDE: <span id="watchdude-status">ACTIVE</span>
        <button class="crash-btn" style="margin-top:10px; width:100%;" onclick="triggerManualCrash()">[SIMULATE CRASH]</button>
    </div>

    <div class="ticker-wrap">
        <div id="main-ticker" class="ticker">
            WELCOME TO THE SLEEPOVER VC MONITORING WEBSITE :-) // THE CURRENT TIME IS <span id="ticker-clock">...</span> // SYSTEM STATUS: OPTIMAL //
        </div>
    </div>

    <div class="container">
        <div class="timer-section">
            <div class="big-numbers">
                <span id="display-days">--</span> days<br>
                <span id="display-hours">--</span> hours
            </div>
            <div style="font-size: 1rem; opacity: 0.6;">Started: March 15, 2026 @ 12:22PM (GMT+8)</div>
        </div>

        <div class="console-box">
            <div class="console-header">Birds Console</div>
            <div id="console-content"></div>
            <div class="console-input-area">
                <span style="color:#3d8bff; margin-right:10px; font-weight:bold;">>></span>
                <input type="text" id="user-input" placeholder="Type //help for commands..." autocomplete="off">
            </div>
        </div>
    </div>

    <div class="credits">MADE BY .what_0 AND Gemini 3.0 Fast</div>

<script>
    const START_TIME = Date.UTC(2026, 2, 15, 4, 22, 0); 
    const MAX_LOGS = 100;
    let loreState = "IDLE"; // IDLE, AWAITING_CONFIRM, AWAITING_LOGIN, LOCKED
    
    function logToConsole(message, type = "LOG") {
        const consoleContent = document.getElementById("console-content");
        while (consoleContent.children.length >= MAX_LOGS) consoleContent.removeChild(consoleContent.firstChild);
        
        const entry = document.createElement("div");
        entry.style.marginBottom = "8px";
        
        if (type === "USER") {
            entry.style.color = "#ffffff";
            entry.innerText = `>> [USER]: ${message}`;
        } else if (type === "ERR") {
            entry.style.color = "#ff3131";
            entry.innerText = `>> [ERR]: ${message}`;
        } else if (type === "NIGHT") {
            entry.style.color = "#888888"; // Grey font
            entry.innerText = `>> [NIGHT]: ${message}`;
        } else if (type === "NONE") {
            entry.innerText = message;
        } else {
            entry.innerText = `>> [LOG]: ${message}`;
        }
        
        consoleContent.appendChild(entry);
        consoleContent.scrollTop = consoleContent.scrollHeight;
    }

    const userInput = document.getElementById('user-input');

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const rawText = userInput.value.trim();
            if (rawText === "") return;
            const cmd = rawText.toLowerCase();

            // 1. Handle Lore Sequence First
            if (loreState === "AWAITING_CONFIRM") {
                logToConsole(rawText, "USER");
                if (cmd === "y") {
                    loreState = "AWAITING_LOGIN";
                    logToConsole("Hello! Welcome to the Remote Night(c) Management Interface!", "NIGHT");
                    logToConsole("Please enter your username and password that you received in your orientation. (Enter your credentials with >> [USER]: [username], [password].)", "NIGHT");
                } else if (cmd === "n") {
                    loreState = "LOCKED";
                    logToConsole("Thank you for not proceeding.");
                }
                userInput.value = "";
                return;
            }

            if (loreState === "AWAITING_LOGIN") {
                logToConsole(rawText, "USER");
                // Expecting: skyboxhihi, night32
                const cleanInput = rawText.replace('>> [USER]:', '').trim();
                const parts = cleanInput.split(',').map(p => p.trim());
                
                if (parts[0] !== "skyboxhihi") {
                    logToConsole("Wrong username. Please contact Night(c) Management for further support. Thank you for your time.", "ERR");
                    loreState = "LOCKED";
                } else if (parts[1] !== "night32") {
                    logToConsole("Wrong password. Please contact Night(c) Management for further support. Thank you for your time.", "ERR");
                    loreState = "LOCKED";
                } else {
                    logToConsole("Please forward this message to .what_0. Thank you for your time.", "NIGHT");
                    loreState = "LOCKED";
                }
                userInput.value = "";
                return;
            }

            // 2. Handle Standard Commands
            logToConsole(rawText, "USER");
            if (cmd === "//lorepiece") {
                if (loreState === "LOCKED") {
                    logToConsole("Command locked. Access denied.", "ERR");
                } else {
                    loreState = "AWAITING_CONFIRM";
                    logToConsole("You are exiting Birds Console and The Sleepover boundaries. Are you sure? (Designate your answer with Y or N.)");
                }
            } 
            else if (cmd === "//help") {
                logToConsole("Available: //clear, //bird, //fact, //yesorno, //totaltime, //startticker, //stopticker, //lorepiece", "NONE");
            }
            else if (cmd === "//clear") document.getElementById("console-content").innerHTML = "";
            else if (cmd === "//fact") handleFacts();
            else if (cmd === "//yesorno") logToConsole(Math.random() > 0.5 ? "Mhm.. Yeah." : "Nah, nuh-uh.");
            else if (cmd === "//totaltime") {
                const diff = Date.now() - START_TIME;
                logToConsole(`Uptime: ${Math.floor(diff/86400000)}d ${Math.floor((diff/3600000)%24)}h ${Math.floor((diff/60000)%60)}m.`);
            }
            
            userInput.value = "";
        }
    });

    async function handleFacts() {
        if (Math.random() < 0.05) { logToConsole("Maw. :3"); return; }
        const pool = [
            "Project run under GitHub Pages now.",
            "ChatGPT helped but failed in the end.",
            "I look left and right. No one here.",
            "ETERNAL SILENCE FOREVER.",
            "TERMINATE"
        ];
        let s = pool[Math.floor(Math.random() * pool.length)];
        if(s === "TERMINATE") {
            logToConsole("Self-terminating...");
            for(let i=0; i<3; i++) { await new Promise(r => setTimeout(r, 500)); logToConsole("Failed to terminate.", "ERR"); }
        } else { logToConsole(s); }
    }

    function mainUpdateLoop() {
        const now = new Date();
        const tickerClock = document.getElementById("ticker-clock");
        if (tickerClock) tickerClock.innerText = now.toLocaleTimeString();
        
        const diff = now.getTime() - START_TIME;
        document.getElementById("display-days").innerText = Math.floor(diff / 86400000);
        document.getElementById("display-hours").innerText = Math.floor((diff / 3600000) % 24);
        
        requestAnimationFrame(mainUpdateLoop);
    }
    mainUpdateLoop();
</script>
</body>
</html>
